<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修行アプリ</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- タイトル -->
    <div class="header">

        <h1 id="title">🍱 食事</h1>

        <div id="status" class="status">
            待機中
        </div>

    </div>

    <!-- タイマー -->
    <div class="timer-card">

        <div id="liveTime" class="live-time">
            00:00:00
        </div>

    </div>

    <!-- 情報カード -->
    <div class="info-card">

        <div class="info-item">
            <p class="label">開始</p>
            <p id="startTimeText">--:--</p>
        </div>

        <div class="info-item">
            <p class="label">終了</p>
            <p id="endTimeText">--:--</p>
        </div>

        <div class="info-item">
            <p class="label">修行時間</p>
            <p id="time">0 秒</p>
        </div>

    </div>

    <!-- ボタン -->
    <div class="button-area">

        <button id="startBtn" class="main-button">
            修行開始
        </button>

        <button id="stopBtn" class="main-button stop-button">
            修行終了
        </button>

        <button id="pauseBtn" class="sub-button">
            中断
        </button>

    </div>

</div>

<!-- 下ナビ -->
<nav class="bottom-nav">

    <div class="nav-item active">
        🏠
        <span>ホーム</span>
    </div>

    <div class="nav-item">
        📖
        <span>履歴</span>
    </div>

    <div class="nav-item">
        ⚙️
        <span>設定</span>
    </div>

</nav>

<script type="module" src="app.js"></script>

</body>

</html>
